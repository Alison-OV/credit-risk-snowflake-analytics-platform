name: Credit Risk Data Pipeline CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  validate_python:
    name: Python Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint code (flake8)
        run: |
          flake8 ingestion/ notebooks/ || true

      - name: Run basic tests
        run: |
          pytest -q || true


  dbt_ci:
    name: dbt Build & Test
    runs-on: ubuntu-latest

    needs: validate_python

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake

      - name: dbt debug (connection check)
        run: |
          cd dbt_project
          dbt debug

      - name: dbt run (build models)
        run: |
          cd dbt_project
          dbt run

      - name: dbt test (data quality checks)
        run: |
          cd dbt_project
          dbt test


  security_check:
    name: Security Scan (basic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run pip audit
        run: |
          pip install pip-audit
          pip-audit || true


  deployment:
    name: Deploy Pipeline (simulated production)
    runs-on: ubuntu-latest
    needs: [validate_python, dbt_ci]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy message
        run: |
          echo "Deploying Credit Risk Pipeline to Production Environment"
          echo "Snowflake models updated"
          echo "dbt marts refreshed"
          echo "Data lake pipelines validated"